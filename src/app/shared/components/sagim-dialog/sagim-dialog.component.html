<h2 mat-dialog-title class="sagim-dialog-title">{{ title }}</h2>

<mat-dialog-content class="sagim-dialog-content">
  @if (isLoading) {
    <div class="sagim-dialog-loading">
      <mat-spinner diameter="40"></mat-spinner>
      <p>Cargando información...</p>
    </div>
  } @else {
    <ng-content></ng-content>
  }
</mat-dialog-content>

<mat-dialog-actions align="end" class="sagim-dialog-actions">
  <app-action-button
    [label]="cancelLabel"
    color="secondary"
    [disabled]="isSubmitting"
    (clicked)="onCancel()"
  />
  <app-action-button
    [label]="isSubmitting ? submitLabel + '...' : submitLabel"
    color="primary"
    [loading]="isSubmitting"
    [disabled]="submitDisabled || isLoading"
    (clicked)="onSubmit()"
  />
</mat-dialog-actions>
