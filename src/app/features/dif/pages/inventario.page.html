<div class="inventario-page">
  <!-- Header con acciones -->
  <div class="page-header">
    <div class="header-content">
      <div class="header-text">
        <h1 class="sagim-title-xl">Inventario DIF</h1>
        <p class="sagim-subtitle-light">
          Gestión de entradas y salidas de bienes
        </p>
      </div>

      <div class="action-buttons">
        <app-action-button
          label="Generar reporte"
          icon="picture_as_pdf"
          color="accent"
          (clicked)="onGenerarReporte()"
        />
        <app-action-button
          label="Nuevo Item"
          icon="inventory"
          color="primary"
          (clicked)="onCreateItem()"
        />
      </div>
    </div>
  </div>

  <!-- KPIs superiores -->
  <app-dashboard-kpis [loading]="loading" [dashboardData]="dashboardData" />

  <!-- Sección de Alertas Críticas -->
  @if (!loading && dashboardData) {
    <app-alertas-criticas [items]="dashboardData.inventarioFisico.stockCritico.items" />

    <!-- Resumen de Movimientos del Mes -->
    <app-resumen-movimientos
      [movimientos]="dashboardData.inventarioFisico.movimientosDelMes"
      titulo="Movimientos Físicos del Mes"
      modo="fisico"
    />
    <app-resumen-movimientos
      [movimientos]="dashboardData.fondosMonetarios.movimientosDelMes"
      titulo="Movimientos de Fondos del Mes"
      modo="monetario"
    />

    <!-- Actividad Reciente -->
    @if (dashboardData.ultimosMovimientos && dashboardData.ultimosMovimientos.length > 0) {
      <app-actividad-reciente
        [movimientos]="dashboardData.ultimosMovimientos"
      />
    }
  }
</div>
