<mat-card appearance="outlined" class="alerts-section">
  <mat-card-header>
    <mat-card-title> Artículos con Stock Crítico </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    @if (items.length > 0) {
      <app-data-table
        [dataSource]="stockTableData"
        [columns]="stockColumns"
        noDataMessage="No hay alertas críticas"
        noDataIcon="check_circle"
      >
        <ng-template #cellTemplate let-row let-column="column">
          @if (column === "estado") {
            <span [class]="getEstadoBadgeClass(row.estado)">
              {{
                row.estado === "CRITICO"
                  ? "🔴"
                  : row.estado === "BAJO"
                    ? "🟡"
                    : "🟢"
              }}
              {{ row.estado }}
            </span>
          } @else {
            {{ row[column] }}
          }
        </ng-template>
      </app-data-table>
    } @else {
      <div class="no-alerts">
        <mat-icon>check_circle</mat-icon>
        <p>Sin alertas críticas actualmente</p>
      </div>
    }
  </mat-card-content>
</mat-card>
