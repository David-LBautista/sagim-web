@if (loading) {
  <div class="kpi-loading">
    <mat-spinner diameter="44"></mat-spinner>
    <span class="loading-text">Cargando...</span>
  </div>
} @else {
  <div class="kpi-grid">
    @if (dashboardData) {
    <app-kpi-card
      [value]="dashboardData.resumen.totalArticulosFisicos"
      [label]="'Artículos Físicos'"
      [icon]="'inventory'"
    />

    <app-kpi-card
      [value]="dashboardData.inventarioFisico.stockCritico.total"
      [label]="'Stock Crítico'"
      [icon]="'warning'"
    />

    <app-kpi-card
      [value]="getTotalMovimientos()"
      [label]="'Movimientos del Mes'"
      [icon]="'bar_chart'"
    />

    <app-kpi-card
      [value]="'$' + dashboardData.resumen.fondosDisponibles.toLocaleString('es-MX')"
      [label]="'Fondos Disponibles'"
      [icon]="'account_balance_wallet'"
    />
    } @else {
      <app-kpi-card [value]="''" [label]="''" [icon]="''" [error]="true" />
    }
  </div>
}
