@if (error() || mantenimiento()) {
  <app-mantenimiento />
} @else {
  <div class="public-layout">
    <app-public-navbar />

    <main class="public-main">
      @if (cargando()) {
        <div class="public-loading">
          <div class="public-loading__spinner"></div>
        </div>
      } @else {
        <router-outlet />
      }
    </main>

    <app-public-footer />
  </div>
}
